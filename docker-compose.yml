services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis
    shm_size: '2g'
    restart: unless-stopped
    # No external port — only reachable via Caddy on the internal network
    expose:
      - "8080"
    volumes:
      - jarvis-data:/data/jarvis
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BOT_NAME=${BOT_NAME:-}
      - MEET_URL=${MEET_URL:-}
      - LANGUAGE=${LANGUAGE:-}
      - TTS_VOICE=${TTS_VOICE:-}
      - RESPONSE_MODE=${RESPONSE_MODE:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - INTENT_MODEL=${INTENT_MODEL:-}
      - TRANSCRIPTION_MODE=${TRANSCRIPTION_MODE:-}
      - MAX_RESPONSE_TOKENS=${MAX_RESPONSE_TOKENS:-}
      - RUST_LOG=${RUST_LOG:-jarvis=info}
    stop_grace_period: 30s
    networks:
      - jarvis-net

  caddy:
    image: caddy:2-alpine
    container_name: jarvis-caddy
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/app/caddy-entrypoint.sh"]
    ports:
      - "8080:8080"
    environment:
      - CADDY_AUTH_ENABLED=${CADDY_AUTH_ENABLED:-true}
      - CADDY_AUTH_USER=${CADDY_AUTH_USER:-admin}
      - CADDY_AUTH_HASH=${CADDY_AUTH_HASH:-}
      - CADDY_LISTEN=${CADDY_LISTEN:-:8080}
    volumes:
      - ./docker/caddy-entrypoint.sh:/app/caddy-entrypoint.sh:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - jarvis-net
    depends_on:
      - jarvis

volumes:
  jarvis-data:
  caddy-data:
  caddy-config:

networks:
  jarvis-net:
    driver: bridge
