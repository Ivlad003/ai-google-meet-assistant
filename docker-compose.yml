name: ai-meet-assistant

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=vexa
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vexa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    networks:
      - default
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=vexa-access-key
      - MINIO_ROOT_PASSWORD=vexa-secret-key
    volumes:
      - minio-data:/data
    networks:
      - default
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 vexa-access-key vexa-secret-key
        mc mb --ignore-existing vexa/vexa-recordings
        exit 0
    networks:
      - default

  # --- DB Init (creates tables on first boot) ---
  db-init:
    build:
      context: .
      dockerfile: services/transcription-collector/Dockerfile
    entrypoint: ["python", "-c", "from shared_models.database import init_db; import asyncio; asyncio.run(init_db()); print('DB initialized')"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vexa
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  # --- Vexa Core ---
  admin-api:
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vexa
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_SSL_MODE=disable
      - ADMIN_API_TOKEN=auto-generated-admin-token
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8056}:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - BOT_MANAGER_URL=http://bot-manager:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://transcription-collector:8000
      - MCP_URL=http://mcp:18888
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      admin-api:
        condition: service_healthy
      bot-manager:
        condition: service_started
      transcription-collector:
        condition: service_started
    networks:
      - default
    restart: unless-stopped

  bot-manager:
    build:
      context: .
      dockerfile: services/bot-manager/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BOT_IMAGE_NAME=vexa-bot:dev
      - TTS_SERVICE_URL=http://tts-service:8002
      - DOCKER_NETWORK=ai-meet-assistant_default
      - LOG_LEVEL=INFO
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vexa
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_SSL_MODE=disable
      - DOCKER_HOST=unix://var/run/docker.sock
      - DEVICE_TYPE=remote
      - WHISPER_LIVE_URL=ws://whisperlive-remote:9090/ws
      - ADMIN_TOKEN=auto-generated-admin-token
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=vexa-access-key
      - MINIO_SECRET_KEY=vexa-secret-key
      - MINIO_BUCKET=vexa-recordings
      - MINIO_SECURE=false
      - RECORDING_ENABLED=false
      - CAPTURE_MODES=audio
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_started
      tts-service:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  transcription-collector:
    build:
      context: .
      dockerfile: services/transcription-collector/Dockerfile
    volumes:
      - ./alembic.ini:/app/alembic.ini
      - ./libs/shared-models/alembic:/app/alembic
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=vexa
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_SSL_MODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_STREAM_NAME=transcription_segments
      - REDIS_CONSUMER_GROUP=collector_group
      - REDIS_STREAM_READ_COUNT=10
      - REDIS_STREAM_BLOCK_MS=2000
      - ADMIN_TOKEN=auto-generated-admin-token
      - BACKGROUND_TASK_INTERVAL=10
      - IMMUTABILITY_THRESHOLD=30
      - REDIS_SEGMENT_TTL=3600
      - REDIS_CLEANUP_THRESHOLD=86400
      - LOG_LEVEL=INFO
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=vexa-access-key
      - MINIO_SECRET_KEY=vexa-secret-key
      - MINIO_BUCKET=vexa-recordings
      - MINIO_SECURE=false
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  tts-service:
    build:
      context: .
      dockerfile: services/tts-service/Dockerfile
    expose:
      - "8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOG_LEVEL=INFO
    networks:
      - default
    restart: unless-stopped

  transcription-service:
    build:
      context: ./services/transcription-service
      dockerfile: Dockerfile.cpu
    environment:
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      - MODEL_SIZE=base
    expose:
      - "8000"
    networks:
      - default
    restart: unless-stopped

  whisperlive-remote:
    build:
      context: .
      dockerfile: services/WhisperLive/Dockerfile.cpu
    volumes:
      - wl-recordings:/var/lib/wl-recordings
    environment:
      - REDIS_STREAM_URL=redis://redis:6379/0/transcription_segments
      - TRANSCRIPTION_COLLECTOR_URL=redis://redis:6379/0/transcription_segments
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_STREAM_NAME=transcription_segments
      - LANGUAGE_DETECTION_SEGMENTS=10
      - VAD_FILTER_THRESHOLD=0.1
      - MIN_AUDIO_S=2.0
      - WL_RECORDING_DIR=/var/lib/wl-recordings
      - WL_RECORDING_FLUSH_SECONDS=3
      - WL_RECORDING_FSYNC_SECONDS=10
      - WL_RECORDING_ROTATE_SECONDS=20
      - WL_RECORDING_ROTATE_BYTES=16777216
      - WL_RECORDING_SNAPSHOT_SECONDS=20
      - WL_RECORDING_UPLOAD_URL=http://bot-manager:8080/internal/recordings/upload
      - SAME_OUTPUT_THRESHOLD=3
      - DEVICE_TYPE=remote
      - REMOTE_TRANSCRIBER_URL=http://transcription-service:8000/v1/audio/transcriptions
      - REMOTE_TRANSCRIBER_API_KEY=internal-key
      - CONSUL_ENABLE=false
    deploy:
      replicas: 1
    command: >-
      --port 9090
      --backend remote
      --min_audio_s 2.0
      --wl_recording_dir /var/lib/wl-recordings
      --wl_recording_flush_seconds 3
      --wl_recording_fsync_seconds 10
      --wl_recording_rotate_seconds 20
      --wl_recording_rotate_bytes 16777216
      --wl_recording_snapshot_seconds 20
      --same_output_threshold 3
    expose:
      - "9090"
      - "9091"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9091/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      transcription-collector:
        condition: service_started
      transcription-service:
        condition: service_started
    networks:
      - default
    restart: unless-stopped

  # --- Vexa Bot Image (build-only, launched dynamically by bot-manager) ---
  vexa-bot:
    build:
      context: ./services/vexa-bot
      dockerfile: Dockerfile
    image: vexa-bot:dev
    profiles:
      - build-only
    entrypoint: ["echo", "image built"]

  # --- Auto Setup ---
  init-setup:
    image: alpine:3.19
    volumes:
      - setup-data:/shared
      - ./scripts:/scripts:ro
    environment:
      - ADMIN_API_TOKEN=auto-generated-admin-token
      - MEET_URL=${MEET_URL:-}
      - BOT_DISPLAY_NAME=${BOT_DISPLAY_NAME:-AI Assistant}
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl jq && /bin/sh /scripts/init-setup.sh"]
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - default

  # --- AI Assistant ---
  meet-bot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_UI_PORT:-8080}:8080"
    environment:
      - VEXA_API_BASE=http://api-gateway:8000
      - VEXA_WS_URL=ws://api-gateway:8000/ws
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - TRIGGER_PHRASE=${TRIGGER_PHRASE:-hey bot}
      - BOT_DISPLAY_NAME=${BOT_DISPLAY_NAME:-AI Assistant}
      - SUMMARY_INTERVAL=${SUMMARY_INTERVAL:-10m}
      - TTS_PROVIDER=${TTS_PROVIDER:-openai}
      - TTS_VOICE=${TTS_VOICE:-nova}
      - MEET_URL=${MEET_URL:-}
      - VEXA_HEALTH_URL=http://api-gateway:8000/docs
    volumes:
      - setup-data:/shared
    depends_on:
      init-setup:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  wl-recordings:
  setup-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/shared
